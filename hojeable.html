    <title>Instructivo - Chicas en caramelo</title>
    <style>
        :root {
            --lima: #CBD83B;
            --morado: #A88AED;
            --cream: #FFFEEC;
            --texto: #222;
            --sombra: 0 18px 40px rgba(0, 0, 0, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f5;
            color: var(--texto);
            -webkit-user-select: none;
            user-select: none;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
            -webkit-touch-callout: none;
        }

        .pdf-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #ffffff 0%, var(--cream) 100%);
        }

        .toolbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            z-index: 100;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toolbar-center {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: center;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            appearance: none;
            border: none;
            border-radius: 8px;
            padding: 9px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn-home {
            background: var(--morado);
            color: white;
        }

        .btn-home:hover {
            background: #9877d8;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(168, 138, 237, 0.3);
        }

        .btn-nav {
            background: linear-gradient(135deg, var(--lima) 0%, #b8c92f 100%);
            color: #333;
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
        }

        .btn-nav:hover:not(:disabled) {
            transform: scale(1.08);
            box-shadow: 0 4px 12px rgba(203, 216, 59, 0.4);
        }

        .btn-nav:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-zoom {
            background: #f0f0f0;
            color: var(--morado);
            width: 36px;
            height: 36px;
            padding: 0;
            border-radius: 50%;
            font-size: 16px;
            font-weight: 700;
            border: 2px solid transparent;
        }

        .btn-zoom:hover {
            background: var(--morado);
            color: white;
            transform: scale(1.05);
        }

        .page-info {
            background: linear-gradient(135deg, rgba(168, 138, 237, 0.1) 0%, rgba(203, 216, 59, 0.1) 100%);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            color: var(--morado);
            font-size: 13px;
            min-width: 100px;
            text-align: center;
        }

        .page-range {
            font-size: 12px;
            color: #999;
        }

        .viewer {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #f9f9f9 0%, #f0f0f0 100%);
            position: relative;
        }

        #pdfCanvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
            border-radius: 4px;
            -webkit-user-select: none;
            user-select: none;
            -webkit-user-drag: none;
            -webkit-touch-callout: none;
            pointer-events: none;
            pointer-events: auto;
        }

        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(168, 138, 237, 0.2);
            border-top: 4px solid var(--morado);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-weight: 600;
            color: var(--morado);
            margin-bottom: 8px;
        }

        .loading-subtext {
            font-size: 12px;
            color: #999;
        }

        .error-message {
            background: #fee;
            border: 2px solid #f88;
            color: #c33;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
        }

        @media (max-width: 680px) {
            .toolbar {
                padding: 10px 12px;
                gap: 10px;
            }

            .btn {
                padding: 8px 12px;
                font-size: 13px;
            }

            .btn-nav {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }

            .btn-zoom {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }

            .toolbar-center {
                flex-basis: 100%;
                order: 3;
                margin-top: 8px;
            }

            .page-info {
                font-size: 12px;
                padding: 5px 10px;
            }

            .viewer {
                padding: 4px;
            }

            #pdfCanvas {
                border-radius: 2px;
            }
        }

        @media (max-width: 480px) {
            .toolbar {
                padding: 8px 10px;
            }

            .btn {
                padding: 7px 10px;
                font-size: 12px;
            }

            .btn-nav {
                width: 34px;
                height: 34px;
                font-size: 15px;
            }

            .btn-zoom {
                width: 30px;
                height: 30px;
                font-size: 13px;
            }

            .page-info {
                font-size: 11px;
                padding: 4px 8px;
                min-width: 80px;
            }

            .spinner {
                width: 40px;
                height: 40px;
                border-width: 3px;
            }
        }

        .fullscreen-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            z-index: 90;
            transition: transform 0.2s ease;
        }

        .fullscreen-hint:hover {
            transform: scale(1.1);
        }

        @supports (padding: max(0px)) {
            #pdfCanvas {
                max-height: calc(100% - max(0px));
            }
        }

        /* Protección contra capturas de pantalla */
        @media print {
            body {
                display: none !important;
            }
        }
    </style>
</head>
<body data-protected="pdf">
    <div class="pdf-container">
        <div class="toolbar">
            <div class="toolbar-left">
                <a href="index.html" class="btn btn-home">🏠 Inicio</a>
            </div>
            <div class="toolbar-center">
                <button id="prevBtn" class="btn-nav" title="Página anterior">‹</button>
                <div class="page-info">
                    <div id="pageNumber">1</div>
                    <div class="page-range" id="pageRange">de 1</div>
                </div>
                <button id="nextBtn" class="btn-nav" title="Página siguiente">›</button>
            </div>
            <div class="toolbar-right">
                <button id="zoomOut" class="btn-zoom" title="Alejar">−</button>
                <button id="zoomReset" class="btn-zoom" title="Restablecer">⊙</button>
                <button id="zoomIn" class="btn-zoom" title="Acercar">+</button>
            </div>
        </div>
        <div class="viewer" id="viewer">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <div class="loading-text">Cargando instrucciones…</div>
                <div class="loading-subtext">Esto toma solo unos segundos</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // ============ PROTECCIÓN CONTRA ROBO DE CONTENIDO ============

        // Desactivar click derecho
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        
        // Desactivar F12 y herramientas de desarrollador
        document.addEventListener('keydown', (e) => {
          // F12
          if (e.key === 'F12') {
            e.preventDefault();
          }
          // Ctrl+Shift+I (DevTools)
          if (e.ctrlKey && e.shiftKey && e.key === 'I') {
            e.preventDefault();
          }
          // Ctrl+Shift+J (Consola)
          if (e.ctrlKey && e.shiftKey && e.key === 'J') {
            e.preventDefault();
          }
          // Ctrl+Shift+C (Inspect)
          if (e.ctrlKey && e.shiftKey && e.key === 'C') {
            e.preventDefault();
          }
          // Ctrl+Shift+K (Firefox consola)
          if (e.ctrlKey && e.shiftKey && e.key === 'K') {
            e.preventDefault();
          }
          // Print Screen
          if (e.key === 'PrintScreen') {
            e.preventDefault();
            return false;
          }
          // Shift+Print Screen
          if (e.shiftKey && e.key === 'PrintScreen') {
            e.preventDefault();
            return false;
          }
          // Ctrl+S (Guardar página)
          if (e.ctrlKey && e.key === 's') {
            e.preventDefault();
            return false;
          }
          // Ctrl+Shift+S (Guardar como)
          if (e.ctrlKey && e.shiftKey && e.key === 'S') {
            e.preventDefault();
            return false;
          }
          // Ctrl+C (Copiar)
          if (e.ctrlKey && e.key === 'c') {
            e.preventDefault();
            return false;
          }
          // Ctrl+X (Cortar)
          if (e.ctrlKey && e.key === 'x') {
            e.preventDefault();
            return false;
          }
          // Ctrl+A (Seleccionar todo)
          if (e.ctrlKey && e.key === 'a') {
            e.preventDefault();
            return false;
          }
          // Ctrl+U (Ver código fuente)
          if (e.ctrlKey && e.key === 'u') {
            e.preventDefault();
            return false;
          }
          // Ctrl+F (Buscar)
          if (e.ctrlKey && e.key === 'f') {
            e.preventDefault();
            return false;
          }
          // Ctrl+0 (Resetear zoom)
          if (e.ctrlKey && e.key === '0') {
            e.preventDefault();
            return false;
          }
          // Ctrl+- (Zoom out)
          if (e.ctrlKey && (e.key === '-' || e.key === '_')) {
            e.preventDefault();
            return false;
          }
          // Ctrl++ (Zoom in)
          if (e.ctrlKey && (e.key === '+' || e.key === '=')) {
            e.preventDefault();
            return false;
          }
        });
        
        // Bloquear captura en navegadores que lo soportan
        document.addEventListener('beforeprint', (e) => e.preventDefault());
        window.addEventListener('beforeprint', (e) => e.preventDefault());
        
        // Deshabilitar selección de texto
        document.body.style.userSelect = 'none';
        document.body.style.webkitUserSelect = 'none';
        
        // Bloquear drag & drop
        document.addEventListener('dragstart', (e) => {
          e.preventDefault();
          return false;
        });
        document.addEventListener('drag', (e) => {
          e.preventDefault();
          return false;
        });
        document.addEventListener('drop', (e) => {
          e.preventDefault();
          return false;
        });
        
        // Bloquear copia desde el portapapeles
        document.addEventListener('copy', (e) => {
          e.preventDefault();
          return false;
        });
        
        // Bloquear cortar desde portapapeles
        document.addEventListener('cut', (e) => {
          e.preventDefault();
          return false;
        });
        
        // Detección de DevTools abiertos (inspección de ventanas anormales)
        const devtools = { open: false, orientation: null };
        const threshold = 160;
        
        setInterval(() => {
          if (window.outerWidth - window.innerWidth > threshold ||
              window.outerHeight - window.innerHeight > threshold) {
            if (!devtools.open) {
              devtools.open = true;
              // Silenciosamente detectado
            }
          } else {
            devtools.open = false;
          }
        }, 500);
        
        // Bloquear inicio de sesión en consola
        Object.defineProperty(console, 'log', {
          value: function() {}
        });
        Object.defineProperty(console, 'debug', {
          value: function() {}
        });
        
        // Deshabilitar guardar imágenes del canvas del PDF
        document.addEventListener('contextmenu', (e) => {
          if (e.target.tagName === 'CANVAS' || e.target.id === 'pdfCanvas') {
            e.preventDefault();
            return false;
          }
        });
        
        // Monitoreo anti-bot
        let suspiciousActions = 0;
        const maxSuspiciousActions = 10;
        
        const trackEvent = (type) => {
          suspiciousActions++;
          if (suspiciousActions > maxSuspiciousActions) {
            // Acceso sospechoso detectado
          }
        };
        
        document.addEventListener('copy', () => trackEvent('copy'));
        document.addEventListener('cut', () => trackEvent('cut'));
        
        // Resetear contador cada minuto
        setInterval(() => {
          suspiciousActions = Math.max(0, suspiciousActions - 2);
        }, 60000);
        
        // Bloquear zoom con rueda del ratón
        document.addEventListener('wheel', (e) => {
          if (e.ctrlKey) {
            e.preventDefault();
            return false;
          }
        }, { passive: false });
        
        // Bloquear zoom táctil (pinch zoom en mobile)
        let lastDistance = 0;
        document.addEventListener('touchmove', (e) => {
          if (e.touches.length > 1) {
            e.preventDefault();
            return false;
          }
        }, { passive: false });
        
        // Protección contra headless browsers y selenium/puppeteer
        const isHeadless = () => {
          return /headless/i.test(navigator.userAgent) ||
                 navigator.webdriver ||
                 window.document.documentElement.getAttribute('webdriver') ||
                 !navigator.plugins?.length ||
                 !navigator.languages?.length;
        };
        
        if (isHeadless()) {
          console.warn('Entorno automatizado detectado. Continuando sin redireccionar.');
        }
        
        // Monitoreo de cambios en el DOM (anti-injection)
        const observer = new MutationObserver((mutations) => {
          mutations.forEach((mutation) => {
            if (mutation.type === 'childList') {
              mutation.addedNodes.forEach((node) => {
                if (node.tagName === 'SCRIPT' && !node.src?.includes('cdnjs')) {
                  node.remove();
                }
              });
            }
          });
        });
        
        observer.observe(document.body, {
          childList: true,
          subtree: true
        });
        
        // ============ FIN DE PROTECCIONES ============
        
        // Setup PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const PDF_PATH = 'assets/doc/instructivo miso.pdf';
        const MIN_ZOOM = 0.8;
        const MAX_ZOOM = 3;
        const ZOOM_STEP = 0.2;
        const RENDER_SCALE = window.devicePixelRatio || 1;

        // DOM Elements
        const viewer = document.getElementById('viewer');
        const canvas = document.createElement('canvas');
        canvas.id = 'pdfCanvas';
        
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const zoomOut = document.getElementById('zoomOut');
        const zoomReset = document.getElementById('zoomReset');
        const zoomIn = document.getElementById('zoomIn');
        const pageNumber = document.getElementById('pageNumber');
        const pageRange = document.getElementById('pageRange');

        // State
        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let currentZoom = 1;
        let isRendering = false;

        async function initPdf() {
            try {
                pdfDoc = await pdfjsLib.getDocument(PDF_PATH).promise;
                totalPages = pdfDoc.numPages;
                pageRange.textContent = `de ${totalPages}`;
                
                // Clear loading state
                viewer.innerHTML = '';
                viewer.appendChild(canvas);
                
                // Render first page
                await renderPage(1);
                setupControls();
            } catch (error) {
                showError('Error cargando el PDF: ' + error.message);
                console.error(error);
            }
        }

        async function renderPage(num) {
            if (isRendering || !pdfDoc) return;
            isRendering = true;

            try {
                if (num < 1 || num > totalPages) return;
                
                currentPage = num;
                pageNumber.textContent = currentPage;
                
                const page = await pdfDoc.getPage(num);
                const viewport = page.getViewport({ scale: RENDER_SCALE * currentZoom });
                
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                
                const context = canvas.getContext('2d');
                context.imageSmoothingEnabled = true;
                context.imageSmoothingQuality = 'high';
                
                await page.render({
                    canvasContext: context,
                    viewport: viewport
                }).promise;

                updateNavButtons();
            } catch (error) {
                console.error('Error rendering page:', error);
            } finally {
                isRendering = false;
            }
        }

        function setupControls() {
            // Navigation
            prevBtn.addEventListener('click', () => {
                if (currentPage > 1) {
                    renderPage(currentPage - 1);
                }
            });

            nextBtn.addEventListener('click', () => {
                if (currentPage < totalPages) {
                    renderPage(currentPage + 1);
                }
            });

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') prevBtn.click();
                if (e.key === 'ArrowRight') nextBtn.click();
            });

            // Zoom controls
            zoomOut.addEventListener('click', () => {
                currentZoom = Math.max(MIN_ZOOM, currentZoom - ZOOM_STEP);
                renderPage(currentPage);
            });

            zoomReset.addEventListener('click', () => {
                currentZoom = 1;
                renderPage(currentPage);
            });

            zoomIn.addEventListener('click', () => {
                currentZoom = Math.min(MAX_ZOOM, currentZoom + ZOOM_STEP);
                renderPage(currentPage);
            });

            // Touch/wheel zoom on canvas
            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                if (e.deltaY > 0) {
                    zoomOut.click();
                } else {
                    zoomIn.click();
                }
            }, { passive: false });
        }

        function updateNavButtons() {
            prevBtn.disabled = currentPage <= 1;
            nextBtn.disabled = currentPage >= totalPages;
        }

        function showError(message) {
            viewer.innerHTML = `<div class="error-message">${message}</div>`;
        }

        // Initialize when ready
        document.addEventListener('DOMContentLoaded', initPdf);
    </script>
</body>
</html>
